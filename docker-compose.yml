services:
  mysql:
    image: mysql:8.0
    container_name: bancodigital-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bancodigital_db
      MYSQL_USER: bancodigital
      MYSQL_PASSWORD: bancodigital
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: banco-digital-api
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/bancodigital_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=bancodigital
      - SPRING_DATASOURCE_PASSWORD=bancodigital

volumes:
  mysql_data: