spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bancodigital_db
    username: bancodigital
    password: bancodigital
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    deserialization:
      fail-on-unknown-properties: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
